<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroControl BLE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
        }

        h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #999;
            font-size: 12px;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }

        .btn {
            flex: 1;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 11px 16px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn:hover { background-color: #0056b3; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn.danger { background-color: #dc3545; }
        .btn.danger:hover { background-color: #a71d2a; }
        .btn.secondary { background-color: #6c757d; }
        .btn.secondary:hover { background-color: #495057; }

        #statusBar {
            font-size: 13px;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            background: #e9ecef;
            color: #555;
            transition: all 0.3s;
        }

        #statusBar.conectado { background: #d4edda; color: #155724; }
        #statusBar.error     { background: #f8d7da; color: #721c24; }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .log-header span {
            font-size: 13px;
            font-weight: 600;
            color: #555;
        }

        #clearBtn {
            font-size: 11px;
            background: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            color: #888;
        }

        #clearBtn:hover { background: #f1f1f1; }

        #rawLog {
            background: #1e1e1e;
            color: #00e676;
            font-family: 'Courier New', monospace;
            font-size: 12.5px;
            padding: 14px;
            border-radius: 8px;
            height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .log-line {
            display: flex;
            gap: 8px;
            line-height: 1.5;
        }

        .log-time { color: #888; flex-shrink: 0; }
        .log-msg  { color: #00e676; word-break: break-all; }
        .log-msg.sent  { color: #64b5f6; }
        .log-msg.sys   { color: #ffd54f; }
        .log-msg.error { color: #ef5350; }

        #contador {
            margin-top: 8px;
            font-size: 11px;
            color: #aaa;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>AgroControl BLE</h1>
    <p class="subtitle">SERVICE: 4fa2c730-18ed-46c0-a17f-1d1121d9c889</p>

    <div id="statusBar">Dispositivo no conectado</div>

    <div class="btn-row">
        <button id="connectBtn" class="btn">Conectar</button>
        <button id="disconnectBtn" class="btn danger" disabled>Desconectar</button>
    </div>

    <div class="btn-row">
        <button id="getPlantsBtn" class="btn secondary" disabled>GET_PLANTS</button>
        <button id="getLogBtn"    class="btn secondary" disabled>GET_LOG</button>
    </div>

    <div class="log-header">
        <span>📡 Datos crudos recibidos</span>
        <button id="clearBtn">Limpiar</button>
    </div>

    <div id="rawLog"></div>
    <div id="contador">0 mensajes</div>
</div>

<script>
    const SERVICE_UUID        = '4fa2c730-18ed-46c0-a17f-1d1121d9c889';
    const CHARACTERISTIC_UUID = '6d68efe5-04b6-4a85-94c2-4c047a961e1b';

    const connectBtn    = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const getPlantsBtn  = document.getElementById('getPlantsBtn');
    const getLogBtn     = document.getElementById('getLogBtn');
    const statusBar     = document.getElementById('statusBar');
    const rawLog        = document.getElementById('rawLog');
    const contador      = document.getElementById('contador');

    let device = null;
    let characteristic = null;
    let msgCount = 0;

    function ahora() {
        const d = new Date();
        return d.toLocaleTimeString('es-PE', { hour12: false });
    }

    function addLine(text, tipo = 'recv') {
        const line = document.createElement('div');
        line.className = 'log-line';

        const t = document.createElement('span');
        t.className = 'log-time';
        t.textContent = ahora();

        const m = document.createElement('span');
        m.className = `log-msg ${tipo}`;

        const prefix = tipo === 'sent' ? '▶ ' : tipo === 'sys' ? '⚙ ' : tipo === 'error' ? '✖ ' : '◀ ';
        m.textContent = prefix + text;

        line.append(t, m);
        rawLog.appendChild(line);
        rawLog.scrollTop = rawLog.scrollHeight;

        if (tipo === 'recv') {
            msgCount++;
            contador.textContent = `${msgCount} mensajes`;
        }
    }

    function setStatus(text, cls = '') {
        statusBar.textContent = text;
        statusBar.className = cls;
    }

    function setConnected(conn) {
        connectBtn.disabled    = conn;
        disconnectBtn.disabled = !conn;
        getPlantsBtn.disabled  = !conn;
        getLogBtn.disabled     = !conn;
    }

    // --- CONECTAR ---
    connectBtn.addEventListener('click', async () => {
        setStatus('Buscando dispositivo...');
        try {
            device = await navigator.bluetooth.requestDevice({
                filters: [{ services: [SERVICE_UUID] }],
                optionalServices: [SERVICE_UUID]
            });

            setStatus(`Conectando a ${device.name || 'Dispositivo'}...`);
            addLine(`Dispositivo seleccionado: ${device.name || 'sin nombre'}`, 'sys');

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

            // Suscribirse a notificaciones
            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', onNotify);

            setStatus(`Conectado a ${device.name || 'Dispositivo'}`, 'conectado');
            addLine('Suscripción a notificaciones activa', 'sys');
            setConnected(true);

            device.addEventListener('gattserverdisconnected', () => {
                setStatus('Dispositivo desconectado', 'error');
                addLine('Conexión perdida', 'error');
                setConnected(false);
                characteristic = null;
            });

        } catch (err) {
            setStatus('Error al conectar o búsqueda cancelada', 'error');
            addLine(err.message, 'error');
        }
    });

    // --- DESCONECTAR ---
    disconnectBtn.addEventListener('click', () => {
        if (device && device.gatt.connected) {
            device.gatt.disconnect();
        }
    });

    // --- NOTIFICACIÓN RECIBIDA ---
    function onNotify(event) {
        const value = event.target.value;
        const text = new TextDecoder('utf-8').decode(value);
        addLine(text, 'recv');
    }

    // --- ENVIAR COMANDO ---
    async function enviarComando(cmd) {
        if (!characteristic) return;
        try {
            const encoder = new TextEncoder();
            await characteristic.writeValue(encoder.encode(cmd));
            addLine(cmd, 'sent');
        } catch (err) {
            addLine('Error al enviar: ' + err.message, 'error');
        }
    }

    getPlantsBtn.addEventListener('click', () => enviarComando('GET_PLANTS'));
    getLogBtn.addEventListener('click',    () => enviarComando('GET_LOG'));

    document.getElementById('clearBtn').addEventListener('click', () => {
        rawLog.innerHTML = '';
        msgCount = 0;
        contador.textContent = '0 mensajes';
    });
</script>
</body>
</html>
